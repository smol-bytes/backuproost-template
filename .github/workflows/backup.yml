name: Notion backup

on:
  schedule:
    - cron: "0 3 * * *" # every night at 03:00 UTC — edit to change the schedule
  workflow_dispatch: # adds a "Run workflow" button for manual backups

# never let two backups run at once
concurrency:
  group: notion-backup
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  backup:
    # skip on the template repo itself — only runs in repos created from the template
    if: github.repository != 'smol-bytes/backuproost-template'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # exits non-zero if the backup is incomplete, so a bad run commits nothing
      - name: Sync from Notion
        run: npx --yes backuproost sync --out .
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}

      - name: Commit backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes since the last backup."
          else
            git commit -m "backup: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
